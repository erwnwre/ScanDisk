media:
  input: public/covers
  output: /covers
  rename: true
  categories: [image]

content:
  - name: posts
    label: Articles
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{slug}.md"
      field: create

    view:
      primary: title
      fields: [title, section, date, featured, author]
      sort: [date, title, section, author]
      search: [title, excerpt, section, author]
      default:
        sort: date
        order: desc

    fields:
      - name: title
        label: Titre
        type: string
        required: true
        description: "Titre affiché sur le site."
        options:
          minlength: 3
          maxlength: 120

      - name: slug
        label: Slug
        type: string
        required: true
        description: "Utilisé dans l’URL. Exemple : booba-ultra"
        options:
          minlength: 3
          maxlength: 120

      - name: excerpt
        label: Chapo / extrait
        type: text
        required: true
        description: "Résumé court affiché dans les mosaïques."

      - name: section
        label: Rubrique
        type: select
        required: true
        description: "Choisis la rubrique de publication."
        options:
          values:
            - name: chronik
              label: Chronik
            - name: inside
              label: Inside
            - name: itw
              label: ITW
            - name: freescan
              label: FreeScan

      - name: date
        label: Date de publication
        type: date
        required: true
        default: ""
        description: "Date affichée sur le site."
        options:
          format: "yyyy-MM-dd"

      - name: author
        label: Auteur
        type: string
        description: "Tu peux laisser ScanDisk, ou mettre un nom précis."
        options:
          maxlength: 80

      - name: cover
        label: Image de une
        type: image
        description: "Image principale de l’article."

      - name: rating
        label: Note /5
        type: number
        description: "À remplir uniquement pour les Chronik. Laisser vide pour les autres rubriques."

      - name: youtubeEmbed
        label: URL embed YouTube
        type: string
        description: "Exemple : https://www.youtube.com/embed/XXXXXXXXXXX"

      - name: featured
        label: Mise en avant
        type: boolean
        description: "Active si tu veux pousser l’article dans les blocs vedettes."

      - name: body
        label: Contenu de l’article
        type: rich-text
        description: "Corps principal de l’article."
        options:
          format: markdown
          switcher: true
          categories: [image]
          rename: true

  - name: site
    label: Réglages du site
    type: file
    path: src/data/site.yml
    format: yaml
    fields:
      - name: siteName
        label: Nom du site
        type: string
      - name: baseline
        label: Baseline
        type: text
      - name: description
        label: Description
        type: text
      - name: siteUrl
        label: URL du site
        type: string
      - name: playlistUrl
        label: URL playlist
        type: string
      - name: playlistEmbed
        label: URL embed playlist
        type: string
      - name: footerText
        label: Texte footer
        type: text
      - name: contactEmail
        label: Email de contact
        type: string
      - name: openGraphImage
        label: Image Open Graph
        type: image

  - name: home
    label: Réglages de la home
    type: file
    path: src/data/home.yml
    format: yaml
    fields:
      - name: heroTitle
        label: Titre hero
        type: string
      - name: heroIntro
        label: Intro hero
        type: text
      - name: marqueeText
        label: Texte secondaire
        type: text
      - name: featuredTitle
        label: Titre bloc vedette
        type: string
      - name: latestTitle
        label: Titre bloc derniers articles
        type: string
      - name: mosaicTitle
        label: Titre bloc mosaïque
        type: string
      - name: newsletterTitle
        label: Titre bloc newsletter
        type: string
      - name: newsletterIntro
        label: Intro newsletter
        type: text

  - name: navigation
    label: Navigation
    type: file
    path: src/data/navigation.yml
    format: yaml
    list: true
    fields:
      - name: label
        label: Libellé
        type: string
      - name: url
        label: URL
        type: string
      - name: newTab
        label: Nouvel onglet
        type: boolean

  - name: about
    label: À propos
    type: file
    path: src/content/pages/about.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Titre
        type: string
      - name: excerpt
        label: Extrait
        type: text
      - name: body
        label: Contenu
        type: rich-text

  - name: legal
    label: Mentions légales
    type: file
    path: src/content/pages/legal.md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Titre
        type: string
      - name: excerpt
        label: Extrait
        type: text
      - name: body
        label: Contenu
        type: rich-text

settings:
  hide: true
  content:
    merge: true
  commit:
    templates:
      create: "cms(create): {path}"
      update: "cms(update): {path}"
      delete: "cms(delete): {path}"
      rename: "cms(rename): {oldPath} -> {newPath}"
