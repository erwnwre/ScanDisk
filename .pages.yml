media:
  input: public/covers
  output: /covers
  rename: true
  categories: [image]

content:
  - name: posts
    label: Articles
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    subfolders: false
    filename: "{slug}.md"

    view:
      primary: title
      fields: [title, section, date, featured]
      sort: [date, title, section]
      search: [title, excerpt, section, author]
      default:
        sort: date
        order: desc

    fields:
      - name: title
        label: Titre
        type: string
        required: true
        description: "Titre affiché sur le site."

      - name: slug
        label: Slug
        type: string
        required: true
        description: "Utilisé dans l’URL et pour le nom du fichier. Exemple : booba-ultra"

      - name: excerpt
        label: Chapo / extrait
        type: text
        required: true
        description: "Petit résumé affiché dans les mosaïques et listings."

      - name: section
        label: Rubrique
        type: select
        required: true
        options:
          values:
            - name: chronik
              label: Chronik
            - name: inside
              label: Inside
            - name: itw
              label: ITW
            - name: freescan
              label: FreeScan

      - name: date
        label: Date de publication
        type: date
        required: true
        description: "Date affichée sur le site."

      - name: author
        label: Auteur
        type: string
        description: "Laisse ScanDisk si tu ne veux pas personnaliser."

      - name: cover
        label: Image de une
        type: image
        description: "Image principale de l’article."

      - name: rating
        label: Note sur 5
        type: number
        description: "À remplir uniquement pour les Chronik. Laisse vide pour les autres rubriques."

      - name: youtubeEmbed
        label: URL d’embed YouTube
        type: string
        description: "Exemple : https://www.youtube.com/embed/XXXXXXXXXXX"

      - name: featured
        label: Mettre en avant
        type: boolean
        description: "Active si tu veux pousser l’article en mise en avant."

      - name: body
        label: Contenu de l’article
        type: rich-text

settings:
  hide: true
  content:
    merge: true
  commit:
    templates:
      create: "CMS: création {path}"
      update: "CMS: mise à jour {path}"
      delete: "CMS: suppression {path}"
      rename: "CMS: renommage {oldPath} -> {newPath}"
